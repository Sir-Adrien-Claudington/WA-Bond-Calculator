[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  # Monorepo guard: this site lives in starscape-desktop/ inside the
  # WA-Bond-Calculator repo. Skip the build when a push changed nothing under
  # this folder (e.g. a wabond/newgearing commit). Runs from the base directory,
  # so "-- ." scopes the diff to starscape-desktop. Requires the Netlify site's
  # base directory to be set to "starscape-desktop".
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # No X-Frame-Options: framing is governed by CSP frame-ancestors below so
    # EduTrack (and StarScape itself) can embed these public, auth-free pages.
    # X-Frame-Options only supports DENY/SAMEORIGIN, which cannot allow a
    # specific cross-origin parent, so it is intentionally omitted.
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.open-meteo.com; img-src 'self' data: blob: https://upload.wikimedia.org; font-src 'self'; worker-src blob:; frame-ancestors 'self' https://edutrack-production-2a6d.up.railway.app;"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML (so new deploys are picked up immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
