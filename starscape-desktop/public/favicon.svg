<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#000814"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#3A7FD5" stroke-width="0.6" opacity="0.4"/>

  <!-- Five-pointed star, drawn from scratch -->
  <!-- Outer points at r=18, inner notches at r=7.6, center (32,32), start top -->
  <polygon
    points="
      32,14
      36.16,26.2
      49.1,26.2
      38.97,33.8
      42.4,46
      32,38.4
      21.6,46
      25.03,33.8
      14.9,26.2
      27.84,26.2
    "
    fill="#E8F4FD"
    opacity="0.95"
  />

  <!-- Small accent stars scattered around -->
  <circle cx="14" cy="14" r="1.2" fill="#A8D4F5" opacity="0.8"/>
  <circle cx="50" cy="12" r="0.9" fill="#A8D4F5" opacity="0.7"/>
  <circle cx="52" cy="48" r="1.1" fill="#A8D4F5" opacity="0.6"/>
  <circle cx="11" cy="50" r="0.8" fill="#A8D4F5" opacity="0.7"/>
  <circle cx="55" cy="30" r="0.7" fill="#C8E8FF" opacity="0.5"/>
  <circle cx="8"  cy="32" r="0.7" fill="#C8E8FF" opacity="0.5"/>
</svg>
