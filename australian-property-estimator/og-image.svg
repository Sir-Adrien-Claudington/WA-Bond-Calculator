<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: navy #0f2544 -->
  <rect width="1200" height="630" fill="#0f2544"/>

  <!-- Right-side bar chart accent — 4 bars bottom-aligned at y=550 -->
  <!-- Bar 1: shortest, #1e5fad -->
  <rect x="790" y="330" width="72" height="220" rx="6" fill="#1e5fad" opacity="0.85"/>
  <!-- Bar 2: medium-low, #0ea5e9 -->
  <rect x="882" y="240" width="72" height="310" rx="6" fill="#0ea5e9" opacity="0.9"/>
  <!-- Bar 3: medium-high, #1e5fad -->
  <rect x="974" y="155" width="72" height="395" rx="6" fill="#1e5fad" opacity="0.75"/>
  <!-- Bar 4: tallest, #0ea5e9 -->
  <rect x="1066" y="80" width="72" height="470" rx="6" fill="#0ea5e9" opacity="0.55"/>

  <!-- Heading: "newgearing.xyz" — white, 52px, weight 600 -->
  <text x="80" y="210"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="600"
        fill="white">newgearing.xyz</text>

  <!-- Sub-heading — white, 28px, opacity 0.75 -->
  <text x="80" y="264"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="400"
        fill="white"
        opacity="0.75">Australian Property Investment Estimator</text>

  <!-- Thin divider line -->
  <line x1="80" y1="305" x2="700" y2="305"
        stroke="white" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Bottom tag-line — white, 20px, opacity 0.5 -->
  <text x="80" y="532"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="400"
        fill="white"
        opacity="0.5">Stamp Duty · Land Tax · Negative Gearing · CGT</text>
</svg>
