<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: site primary blue #1f5fa8 -->
  <rect width="1200" height="630" fill="#1f5fa8"/>

  <!-- Right accent: simple shield shape at 20% opacity -->
  <polygon points="900,160 1050,160 1050,370 900,470 750,370 750,160"
           fill="white" opacity="0.07"/>
  <polygon points="900,190 1020,190 1020,360 900,445 780,360 780,190"
           fill="none" stroke="white" stroke-width="3" opacity="0.18"/>
  <!-- WA initials inside shield -->
  <text x="870" y="320"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64" font-weight="700"
        fill="white" opacity="0.15">WA</text>

  <!-- Top-left heading: "wabond.today" -->
  <text x="80" y="200"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52" font-weight="600"
        fill="white">wabond.today</text>

  <!-- Sub-line 1 -->
  <text x="80" y="256"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="400"
        fill="white" opacity="0.8">WA Rental Bond Claim Calculator</text>

  <!-- Sub-line 2 -->
  <text x="80" y="300"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22" font-weight="400"
        fill="white" opacity="0.6">Free tool for WA landlords and tenants</text>

  <!-- Thin divider -->
  <line x1="80" y1="340" x2="680" y2="340"
        stroke="white" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Bottom legislation citation -->
  <text x="80" y="535"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18" font-weight="400"
        fill="white" opacity="0.5">Residential Tenancies Act 1987 (WA)</text>
</svg>
